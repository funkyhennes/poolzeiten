<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Poolzeiten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Schibsted+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --wasser:#0E7DA0;
  --tiefe:#08344A;
  --becken:#EFF7FA;
  --kachel:#FFFFFF;
  --linie:#C9E2EC;
  --sonne:#FFB703;
  --signal:#E4572E;
  --gras:#2E8B57;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Schibsted Grotesk',system-ui,sans-serif;
  background:var(--becken);
  color:var(--tiefe);
  min-height:100vh;
  padding-bottom:90px;
}
/* ---------- Header ---------- */
header{
  background:var(--wasser);
  color:#fff;
  padding:calc(env(safe-area-inset-top,0px) + 22px) 20px 0;
  position:relative;
}
header h1{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;
  font-size:clamp(30px,8vw,44px);
  letter-spacing:-.02em;
  line-height:1;
}
header .sub{
  margin-top:6px; margin-bottom:14px;
  font-size:14px; opacity:.85;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.wave{display:block;width:100%;height:26px;margin-bottom:-1px}
#syncState{font-size:12px;padding:2px 9px;border-radius:99px;background:rgba(255,255,255,.18)}
/* ---------- Layout ---------- */
main{max-width:640px;margin:0 auto;padding:18px 16px 0}
.dayGroup{margin-bottom:26px}
.dayHead{
  display:flex;justify-content:space-between;align-items:flex-end;gap:10px;
  padding:0 2px 8px;flex-wrap:wrap;
}
.dayHead h2{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:700;font-size:19px;letter-spacing:-.01em;
}
.dayHead .rel{font-size:13px;color:var(--wasser);font-weight:500}
/* ---------- Wetter ---------- */
.wx{
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
}
.wx .chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12.5px;font-weight:700;
  padding:4px 10px;border-radius:99px;
  background:var(--kachel);border:1.5px solid var(--linie);
}
.chip.sun{border-color:#F5D68A;background:#FFF7E0;color:#8A6100}
.chip.rain-lo{border-color:#BFE0C9;background:#EAF7EE;color:#1E6B41}
.chip.rain-mid{border-color:#F5D68A;background:#FFF7E0;color:#8A6100}
.chip.rain-hi{border-color:#F3B7A5;background:#FDEEE8;color:#A33417}
.chip.na{color:#7C97A3;font-weight:500}
/* ---------- Slot Cards ---------- */
.slot{
  background:var(--kachel);
  border:1.5px solid var(--linie);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:12px;
}
.slot.full{opacity:.72}
.slotTop{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.slotTime{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:22px;letter-spacing:-.01em;
}
.cap{font-size:13px;font-weight:700;color:var(--wasser);white-space:nowrap}
.cap.voll{color:var(--signal)}
.badges{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.badge{
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;
}
.badge.andreas{background:#EAF7EE;color:#1E6B41}
.badge.aufsicht{background:#FFF3D6;color:#8A6100}
/* Buchungen */
.buchungen{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.buchung{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  background:var(--becken);border-radius:10px;padding:8px 12px;font-size:14px;
}
.buchung .who{font-weight:700}
.buchung .meta{color:#4A6B7A;font-size:12.5px}
.buchung button{
  background:none;border:none;color:#9AB4BF;font-size:16px;cursor:pointer;padding:4px;
}
/* Buttons */
.btn{
  font-family:inherit;font-size:15px;font-weight:700;
  border:none;border-radius:11px;padding:11px 16px;cursor:pointer;
  transition:transform .06s;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--sonne);color:var(--tiefe);width:100%;margin-top:12px}
.btn.ghost{background:var(--becken);color:var(--wasser)}
.btn.danger{background:#FDEEE8;color:#A33417}
.btn:disabled{opacity:.45;cursor:default}
/* Formulare */
.form{margin-top:12px;display:none;flex-direction:column;gap:9px}
.form.open{display:flex}
label{font-size:12.5px;font-weight:700;color:#4A6B7A;margin-bottom:-4px}
input,select{
  font-family:inherit;font-size:16px;
  border:1.5px solid var(--linie);border-radius:10px;
  padding:10px 12px;background:#fff;color:var(--tiefe);width:100%;
}
input:focus,select:focus{outline:2px solid var(--wasser);outline-offset:-1px;border-color:var(--wasser)}
.hint{font-size:12.5px;color:#4A6B7A;line-height:1.4}
.leer{
  text-align:center;color:#5E7E8C;padding:50px 20px;font-size:15px;line-height:1.5;
}
/* ---------- Admin ---------- */
#adminBar{
  display:none;background:var(--tiefe);color:#fff;border-radius:var(--radius);
  padding:16px;margin-bottom:22px;
}
#adminBar.on{display:block}
#adminBar h3{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
#adminBar h3 button{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer}
#adminBar .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
#adminBar .grid .full{grid-column:1/-1}
#adminBar label{color:#9FC3D2}
#adminBar input,#adminBar select{border-color:transparent}
.slot .adminDel{margin-top:10px;width:100%}
/* Footer */
footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 10px);
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to top,var(--becken) 65%,transparent);
  max-width:640px;margin:0 auto;
}
footer button{
  background:none;border:none;color:#7C97A3;font-size:13px;font-weight:700;cursor:pointer;padding:8px;
}
/* Toast */
#toast{
  position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);
  background:var(--tiefe);color:#fff;padding:11px 20px;border-radius:99px;
  font-size:14px;font-weight:700;opacity:0;pointer-events:none;
  transition:all .25s;white-space:nowrap;z-index:50;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <h1>Poolzeiten</h1>
  <div class="sub">
    <span>Andreas’ Pool · Königswinter</span>
    <span id="syncState">lädt…</span>
  </div>
</header>
<svg class="wave" viewBox="0 0 640 26" preserveAspectRatio="none" aria-hidden="true">
  <path d="M0,0 C80,26 160,26 240,13 C320,0 400,0 480,13 C560,26 600,26 640,13 L640,0 Z" fill="#0E7DA0"/>
</svg>

<main>
  <div id="localWarn" style="display:none;background:#FFF3D6;border:1.5px solid #F5D68A;color:#8A6100;border-radius:var(--radius);padding:12px 14px;font-size:13.5px;line-height:1.45;margin-bottom:18px;">
    <strong>⚠ Nur-lokal-Modus:</strong> Einträge sind nur auf diesem Gerät sichtbar.
    Damit alle dieselben Daten sehen, müssen in der Datei (CONFIG-Block) die
    jsonbin.io-Zugangsdaten eingetragen werden.
  </div>

  <!-- Admin-Bereich -->
  <section id="adminBar">
    <h3>Admin: Zeitfenster anlegen <button onclick="adminLogout()">Abmelden</button></h3>
    <div class="grid">
      <div class="full"><label for="aDate">Datum</label><input type="date" id="aDate"></div>
      <div><label for="aStart">Von</label><input type="time" id="aStart" value="14:00" step="900"></div>
      <div><label for="aEnd">Bis</label><input type="time" id="aEnd" value="16:00" step="900"></div>
      <div><label for="aMax">Max. Personen</label><input type="number" id="aMax" value="4" min="1" max="20"></div>
      <div><label for="aAufsicht">Aufsicht</label>
        <select id="aAufsicht">
          <option value="noetig">Aufsichtsperson nötig</option>
          <option value="admin">Ich übernehme Aufsicht</option>
        </select>
      </div>
    </div>
    <button class="btn primary" onclick="addSlot()">Zeitfenster anlegen</button>
  </section>

  <div id="slotList"></div>
</main>

<footer>
  <button onclick="loadAll(true)">↻ Aktualisieren</button>
  <button id="adminToggle" onclick="adminLogin()">Admin</button>
</footer>

<div id="toast"></div>

<script>
/* ================================================================
   KONFIGURATION – vor dem Veröffentlichen anpassen
   ================================================================ */
const CONFIG = {
  ADMIN_PIN: "1234",          // Admin-PIN ändern!
  // Gemeinsamer Speicher über jsonbin.io (kostenlos):
  // 1. Account anlegen: https://jsonbin.io/register
  //    (Login später: https://jsonbin.io/login)
  // 2. Neuen Bin erstellen mit Inhalt: {"slots":[],"bookings":[]}
  // 3. Bin-ID hier eintragen
  // 4. Unter "API Keys" einen ACCESS KEY (nicht Master Key!) mit
  //    Rechten "Read" + "Update" erstellen und hier eintragen
  JSONBIN_BIN_ID: "6a4ba096da38895dfe34f104",
  JSONBIN_ACCESS_KEY: "$2a$10$onppmyGQ38vQzh.uf8NNU.kTMw/SxgTWKEs.rYCUZbxJK5JHlNCR6",
  // Standort für die Wetterprognose (Königswinter)
  LAT: 50.684,
  LON: 7.189
};
/* ================================================================ */

const useCloud = () => CONFIG.JSONBIN_BIN_ID && CONFIG.JSONBIN_ACCESS_KEY;
let state = { slots: [], bookings: [] };
let weather = {};          // "YYYY-MM-DD" -> {tmin,tmax,rain,sun}
let isAdmin = false;
let openFormSlot = null;

/* ---------------- Speicher ---------------- */
async function loadData(){
  if(useCloud()){
    const r = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}/latest`,{
      headers:{ "X-Access-Key": CONFIG.JSONBIN_ACCESS_KEY }
    });
    if(!r.ok) throw new Error("Bin laden fehlgeschlagen");
    const j = await r.json();
    state = j.record && j.record.slots ? j.record : { slots:[], bookings:[] };
  } else {
    state = JSON.parse(localStorage.getItem("poolzeiten") || '{"slots":[],"bookings":[]}');
  }
}
async function saveData(){
  if(useCloud()){
    const r = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}`,{
      method:"PUT",
      headers:{ "Content-Type":"application/json", "X-Access-Key": CONFIG.JSONBIN_ACCESS_KEY },
      body: JSON.stringify(state)
    });
    if(!r.ok) throw new Error("Speichern fehlgeschlagen");
  } else {
    localStorage.setItem("poolzeiten", JSON.stringify(state));
  }
}

/* ---------------- Wetter (Open-Meteo, kein Key nötig) ---------------- */
async function loadWeather(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.LAT}&longitude=${CONFIG.LON}`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunshine_duration`
      + `&timezone=Europe%2FBerlin&forecast_days=16`;
    const r = await fetch(url);
    const j = await r.json();
    weather = {};
    (j.daily?.time || []).forEach((d,i)=>{
      weather[d] = {
        tmax: Math.round(j.daily.temperature_2m_max[i]),
        tmin: Math.round(j.daily.temperature_2m_min[i]),
        rain: j.daily.precipitation_probability_max[i],
        sun:  Math.round(j.daily.sunshine_duration[i] / 3600 * 10) / 10
      };
    });
  }catch(e){ weather = {}; }
}
function wxHtml(dateStr){
  const w = weather[dateStr];
  if(!w) return `<div class="wx"><span class="chip na">keine Prognose verfügbar</span></div>`;
  const rc = w.rain >= 60 ? "rain-hi" : w.rain >= 30 ? "rain-mid" : "rain-lo";
  return `<div class="wx">
    <span class="chip">🌡️ ${w.tmin}–${w.tmax}°C</span>
    <span class="chip ${rc}">🌧️ ${w.rain ?? "–"}%</span>
    <span class="chip sun">☀️ ${w.sun} h</span>
  </div>`;
}

/* ---------------- Rendering ---------------- */
const fmtDate = d => new Date(d+"T12:00").toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});
function relDay(d){
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((new Date(d+"T00:00") - today) / 86400000);
  return diff===0 ? "Heute" : diff===1 ? "Morgen" : "";
}
function render(){
  const list = document.getElementById("slotList");
  const today = new Date().toISOString().slice(0,10);
  const slots = state.slots
    .filter(s => s.date >= today)
    .sort((a,b) => (a.date+a.start).localeCompare(b.date+b.start));

  if(!slots.length){
    list.innerHTML = `<div class="leer">Noch keine Zeitfenster geplant.<br>Schau später nochmal vorbei! 🏊</div>`;
    return;
  }
  const byDate = {};
  slots.forEach(s => (byDate[s.date] ??= []).push(s));

  list.innerHTML = Object.entries(byDate).map(([date, daySlots]) => `
    <section class="dayGroup">
      <div class="dayHead">
        <h2>${fmtDate(date)}</h2>
        <span class="rel">${relDay(date)}</span>
      </div>
      ${wxHtml(date)}
      <div style="height:10px"></div>
      ${daySlots.map(slotHtml).join("")}
    </section>`).join("");
}
function slotHtml(s){
  const bks = state.bookings.filter(b => b.slotId === s.id);
  const belegt = bks.reduce((n,b) => n + Number(b.personen||1), 0);
  const frei = s.maxPersonen - belegt;
  const voll = frei <= 0;
  const aufsichtBadge = s.aufsicht === "admin"
    ? `<span class="badge andreas">✓ Aufsicht: Andreas</span>`
    : `<span class="badge aufsicht">⚠ Aufsichtsperson nötig</span>`;
  return `
  <article class="slot ${voll?"full":""}">
    <div class="slotTop">
      <span class="slotTime">${s.start}–${s.end} Uhr</span>
      <span class="cap ${voll?"voll":""}">${voll ? "Belegt" : frei+" von "+s.maxPersonen+" frei"}</span>
    </div>
    <div class="badges">${aufsichtBadge}</div>
    ${bks.length ? `<div class="buchungen">${bks.map(b=>`
      <div class="buchung">
        <div>
          <span class="who">${esc(b.name)}</span>
          <span class="meta">· ${b.personen} Pers.${b.aufsichtsperson ? " · Aufsicht: "+esc(b.aufsichtsperson) : ""}</span>
        </div>
        <button title="Buchung stornieren" onclick="cancelBooking('${b.id}')">✕</button>
      </div>`).join("")}</div>` : ""}
    ${!voll ? `<button class="btn primary" onclick="toggleForm('${s.id}')">Eintragen</button>` : ""}
    <div class="form ${openFormSlot===s.id?"open":""}" id="form-${s.id}">
      <label for="n-${s.id}">Name</label>
      <input id="n-${s.id}" placeholder="Wer kommt?" autocomplete="name">
      <label for="p-${s.id}">Anzahl Personen</label>
      <input id="p-${s.id}" type="number" min="1" max="${frei}" value="1">
      ${s.aufsicht === "noetig" ? `
        <label for="a-${s.id}">Aufsichtsperson (erwachsen, anwesend)</label>
        <input id="a-${s.id}" placeholder="Wer passt auf?">
        <p class="hint">Für diesen Slot muss eine erwachsene Aufsichtsperson dabei sein.</p>` : `
        <p class="hint">Andreas übernimmt die Aufsicht – einfach eintragen und kommen.</p>`}
      <button class="btn primary" onclick="book('${s.id}')">Verbindlich eintragen</button>
    </div>
    ${isAdmin ? `<button class="btn danger adminDel" onclick="deleteSlot('${s.id}')">Slot löschen (Admin)</button>` : ""}
  </article>`;
}
const esc = t => String(t).replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));

/* ---------------- Aktionen ---------------- */
function toggleForm(id){
  openFormSlot = openFormSlot === id ? null : id;
  render();
  if(openFormSlot) document.getElementById("n-"+id)?.focus();
}
async function book(slotId){
  const s = state.slots.find(x => x.id === slotId);
  const name = document.getElementById("n-"+slotId).value.trim();
  const personen = Number(document.getElementById("p-"+slotId).value) || 1;
  const aufsicht = s.aufsicht === "noetig"
    ? document.getElementById("a-"+slotId).value.trim() : "";
  if(!name) return toast("Bitte Namen eintragen");
  if(s.aufsicht === "noetig" && !aufsicht) return toast("Aufsichtsperson fehlt");

  await withSync(async () => {
    const belegt = state.bookings.filter(b=>b.slotId===slotId)
      .reduce((n,b)=>n+Number(b.personen||1),0);
    if(belegt + personen > s.maxPersonen){ toast("Slot ist inzwischen voll"); return false; }
    state.bookings.push({ id: uid(), slotId, name, personen, aufsichtsperson: aufsicht, ts: Date.now() });
    return true;
  }, "Eingetragen! 🏊");
  openFormSlot = null;
  render();
}
async function cancelBooking(id){
  const b = state.bookings.find(x=>x.id===id);
  if(!b) return;
  if(!confirm(`Buchung von ${b.name} stornieren?`)) return;
  await withSync(async () => {
    state.bookings = state.bookings.filter(x=>x.id!==id);
    return true;
  }, "Storniert");
  render();
}
async function addSlot(){
  const date = document.getElementById("aDate").value;
  const start = document.getElementById("aStart").value;
  const end = document.getElementById("aEnd").value;
  const max = Number(document.getElementById("aMax").value) || 4;
  const aufsicht = document.getElementById("aAufsicht").value;
  if(!date || !start || !end) return toast("Datum und Zeiten angeben");
  if(end <= start) return toast("Ende muss nach Beginn liegen");
  await withSync(async () => {
    state.slots.push({ id: uid(), date, start, end, maxPersonen: max, aufsicht });
    return true;
  }, "Zeitfenster angelegt");
  render();
}
async function deleteSlot(id){
  if(!confirm("Slot inkl. aller Buchungen löschen?")) return;
  await withSync(async () => {
    state.slots = state.slots.filter(s=>s.id!==id);
    state.bookings = state.bookings.filter(b=>b.slotId!==id);
    return true;
  }, "Slot gelöscht");
  render();
}
/* Immer erst frische Daten laden, dann ändern, dann speichern */
async function withSync(mutate, okMsg){
  try{
    setSync("speichert…");
    await loadData();
    const ok = await mutate();
    if(ok !== false){ await saveData(); toast(okMsg); }
    setSync(useCloud() ? "☁︎ synchron" : "nur lokal");
  }catch(e){
    toast("Fehler beim Speichern");
    setSync("offline");
  }
}

/* ---------------- Admin ---------------- */
function adminLogin(){
  if(isAdmin) return;
  const pin = prompt("Admin-PIN:");
  if(pin === CONFIG.ADMIN_PIN){
    isAdmin = true;
    document.getElementById("adminBar").classList.add("on");
    document.getElementById("adminToggle").textContent = "Admin ✓";
    document.getElementById("aDate").value = new Date().toISOString().slice(0,10);
    render();
  } else if(pin !== null){
    toast("Falsche PIN");
  }
}
function adminLogout(){
  isAdmin = false;
  document.getElementById("adminBar").classList.remove("on");
  document.getElementById("adminToggle").textContent = "Admin";
  render();
}

/* ---------------- Helpers ---------------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}
function setSync(txt){ document.getElementById("syncState").textContent = txt; }

/* ---------------- Start ---------------- */
async function loadAll(manual){
  document.getElementById("localWarn").style.display = useCloud() ? "none" : "block";
  try{
    setSync("lädt…");
    await Promise.all([loadData(), loadWeather()]);
    setSync(useCloud() ? "☁︎ synchron" : "nur lokal");
    if(manual) toast("Aktualisiert");
  }catch(e){
    setSync("offline");
    if(manual) toast("Laden fehlgeschlagen");
  }
  render();
}
loadAll();
</script>
</body>
</html>
